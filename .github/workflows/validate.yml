name: Validate Appcast

on:
  push:
    paths:
      - 'appcast.xml'
  pull_request:
    paths:
      - 'appcast.xml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate appcast.xml
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run validation
        run: python3 validate_appcast.py
